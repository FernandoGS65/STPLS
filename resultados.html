<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0b0f1a">
    <title>Resultados - STPLS</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="imagenes/stpls-icon.png">
    <link rel="apple-touch-icon" href="imagenes/stpls-icon.png">
</head>
<body>

<nav class="navbar">
    <div class="nav-top">
        <a href="index.html" class="nav-logo">STPLS</a>
        <div id="nav-controls"></div>
    </div>
    <div id="nav-icons" class="nav-icons"></div>
</nav>

<main class="resultados-page">

    <div class="resultados-header">
        <div>
            <h2>Resultados</h2>
        </div>
    </div>

    <div class="jornada-slider" id="jornada-slider">
        <button class="jornada-arrow" id="jornada-prev" aria-label="Jornada anterior">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <span class="jornada-label" id="jornada-label">Jornada 1</span>
        <button class="jornada-arrow" id="jornada-next" aria-label="Siguiente jornada">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </button>
    </div>

    <div class="resultados-selector-wrapper" style="display:none">
        <select id="selector-jornada" class="resultados-selector"></select>
    </div>

    <div id="menu-bests" class="menu-bests">
        <button class="menu-bests-btn active" data-bestxi="jornada">Equipo de la Jornada</button>
        <button class="menu-bests-btn" data-bestxi="temporada">Equipo de la Temporada</button>
    </div>

    <div id="bestxi-container" class="bestxi-container" style="display:none"></div>

    <div id="lista-resultados"></div>

</main>

<footer>
    <a href="descargas.html" class="footer-link">Descargas</a>
    <span class="footer-copy">STPLS &copy; 2026</span>
</footer>

<script src="js/app.js?v=3"></script>
<script src="js/resultados.js?v=3"></script>

</body>
</html>

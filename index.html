<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0b0f1a">
    <title>STPLS - Spanish Total Players League Scores</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="imagenes/stpls-icon.png">
    <link rel="apple-touch-icon" href="imagenes/stpls-icon.png">
</head>
<body>

<nav class="navbar">
    <div class="nav-top">
        <a href="index.html" class="nav-logo">STPLS</a>
        <div id="nav-controls"></div>
        <button id="themeToggle" aria-label="Cambiar tema">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        </button>
    </div>
    <div id="nav-icons" class="nav-icons"></div>
</nav>

<header class="hero">
    <div class="hero-content">
        <div class="hero-logo">STPLS</div>
        <p class="hero-subtitle">Resultados, clasificaciones y estadísticas del fútbol español</p>
        <div class="hero-stats">
            <span class="hero-stat">
                <strong id="heroTotalPartidos">—</strong>
                Partidos
            </span>
            <span class="hero-stat">
                <strong id="heroTotalGoles">—</strong>
                Goles
            </span>
            <span class="hero-stat">
                <strong id="heroTotalEquipos">20</strong>
                Equipos
            </span>
        </div>
    </div>
</header>

<main class="index-page">
    <div class="index-grid">
        <section class="card-index">
            <div class="card-index-header">
                <h2>Clasificación</h2>
                <a href="clasificaciones.html" class="card-index-link">Ver todas →</a>
            </div>
            <div id="index-clasificacion" class="card-index-body">Cargando...</div>
        </section>

        <section class="card-index">
            <div class="card-index-header">
                <h2>Últimos resultados</h2>
                <a href="resultados.html" class="card-index-link">Ver todos →</a>
            </div>
            <div id="index-resultados" class="card-index-body">Cargando...</div>
        </section>

        <section class="card-index">
            <div class="card-index-header">
                <h2>Próximos partidos</h2>
                <a href="resultados.html" class="card-index-link">Calendario →</a>
            </div>
            <div id="index-proximos" class="card-index-body"></div>
        </section>

        <section class="card-index">
            <div class="card-index-header">
                <h2>Datos de la temporada</h2>
            </div>
            <div id="index-stats" class="card-index-body">Cargando...</div>
        </section>
    </div>
</main>

<footer>
    <span class="footer-copy">STPLS &copy; 2026</span>
</footer>

<script src="js/app.js"></script>
<script src="js/index.js"></script>
<script src="js/proximos-partidos.js"></script>

</body>
</html>

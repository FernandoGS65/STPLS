<!DOCTYPE html>
<html lang="es">
<head>

    <meta name="apple-mobile-web-app-capable" content="yes">

    <title>STPLS - Spanish Total Players League Scores</title>
    <link rel="manifest" href="manifest.json">

<body>

<nav class="navbar">

        <div id="nav-controls"></div>
    </div>
    <div id="nav-icons" class="nav-icons"></div>
</nav>

<main class="index-page">
    <div class="ligas-grid">
        <a href="resultados.html?comp=liga" class="liga-card liga-card--active">
            <div class="liga-logo">
                <svg viewBox="0 0 100 100" fill="none">
                    <circle cx="50" cy="50" r="45" stroke="currentColor" stroke-width="4"/>
                    <path d="M50 10 L55 40 L85 40 L60 58 L70 88 L50 70 L30 88 L40 58 L15 40 L45 40 Z" fill="currentColor" opacity="0.9"/>

            </div>

            <span class="liga-estado">Activo</span>
        </a>
        <div class="liga-card liga-card--disabled">
            <div class="liga-logo">
                <svg viewBox="0 0 100 100" fill="none">
                    <rect x="15" y="25" width="70" height="55" rx="5" stroke="currentColor" stroke-width="4"/>
                    <path d="M35 25 L50 5 L65 25" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>
                    <path d="M35 45 L50 40 L65 45" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>

        </div>

            </div>
            <span class="liga-nombre">Serie A</span>
            <span class="liga-estado">Próximamente</span>
        </div>
        <div class="liga-card liga-card--disabled">
            <div class="liga-logo">
                <svg viewBox="0 0 100 100" fill="none">
                    <path d="M50 10 L65 30 L90 35 L72 55 L78 85 L50 70 L22 85 L28 55 L10 35 L35 30 Z" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>

                    <path d="M38 48 L25 48" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                    <path d="M62 48 L75 48" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                </svg>

            <span class="liga-nombre">Champions</span>
            <span class="liga-estado">Próximamente</span>
        </div>

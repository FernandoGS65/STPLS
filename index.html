<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0b0f1a">
    <title>STPLS - Spanish Total Players League Scores</title>
    <link rel="manifest" href="manifest.json">

    <link rel="icon" href="imagenes/stpls-icon.png">

<body>

<nav class="navbar">
    <div class="nav-top">
        <a href="index.html" class="nav-logo">STPLS</a>
        <div id="nav-controls"></div>
    </div>
    <div id="nav-icons" class="nav-icons"></div>
</nav>

<main class="index-page">
    <div class="ligas-grid">
        <a href="resultados.html?comp=liga" class="liga-card liga-card--active">
            <div class="liga-logo">
                <img src="imagenes/Logos/liga.webp" alt="La Liga" class="liga-img">
            </div>
            <span class="liga-nombre">La Liga</span>
            <span class="liga-estado">Activo</span>

        <div class="liga-card liga-card--disabled">
            <div class="liga-logo">
                <img src="imagenes/Logos/premier.webp" alt="Premier League" class="liga-img">
            </div>
            <span class="liga-nombre">Premier League</span>
            <span class="liga-estado">Próximamente</span>

        <div class="liga-card liga-card--disabled">
            <div class="liga-logo">
                <img src="imagenes/Logos/serie-a.webp" alt="Serie A" class="liga-img">
            </div>
            <span class="liga-nombre">Serie A</span>
            <span class="liga-estado">Próximamente</span>
        </div>
        <div class="liga-card liga-card--disabled">
            <div class="liga-logo">
                <img src="imagenes/Logos/champions.webp" alt="Champions" class="liga-img">
            </div>
            <span class="liga-nombre">Champions</span>
            <span class="liga-estado">Próximamente</span>

    <div class="featured-section">
        <h2 class="featured-title">⚽ Partido destacado</h2>
        <a href="partido.html?matchId=1183878795" class="featured-card">

        </a>

<footer>
    <span class="footer-copy">STPLS &copy; 2026</span>
</footer>

name: Daily news update

on:
  schedule:
    # Run every day at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update-news:
    runs-on: windows-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch news from RSS feeds
        shell: pwsh
        run: |
          .\fetch-noticias.ps1 -Season "2026-27" -Competition "liga"

      - name: Check environment variables
        run: |
          if ($env:SUPABASE_URL -and $env:SUPABASE_URL.Length -gt 0) { Write-Host "SUPABASE_URL is set (length: $($env:SUPABASE_URL.Length))" } else { Write-Host "SUPABASE_URL is MISSING or empty" }
          if ($env:SUPABASE_SERVICE_ROLE_KEY -and $env:SUPABASE_SERVICE_ROLE_KEY.Length -gt 0) { Write-Host "SUPABASE_SERVICE_ROLE_KEY is set (length: $($env:SUPABASE_SERVICE_ROLE_KEY.Length))" } else { Write-Host "SUPABASE_SERVICE_ROLE_KEY is MISSING or empty" }

      - name: Debug Node environment
        shell: bash
        run: node scripts/debug-env.js

      - name: Migrate news to Supabase
        shell: bash
        run: node scripts/migrate/index.js --only=news --season=2026-27 --competition=liga

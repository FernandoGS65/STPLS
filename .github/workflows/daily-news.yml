name: Daily news update

on:
  schedule:
    # Run every day at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update-news:
    runs-on: windows-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch news from RSS feeds
        shell: pwsh
        run: |
          .\fetch-noticias.ps1 -Season "2026-27" -Competition "liga"

      - name: Migrate news to Supabase
        shell: bash
        run: node scripts/migrate/index.js --only=news --season=2026-27 --competition=liga
